[platformio]
default_envs = waveshare_ESP32_S3_RS485_CAN

[espidf6]
platform = platformio/espressif32@7.0.0
platform_packages =
    framework-espidf @ 4.60001.0

[env:esp32_twai]
platform = ${espidf6.platform}
platform_packages = ${espidf6.platform_packages}
board = esp32dev
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -std=gnu++17
build_unflags = -std=gnu++11

[env:esp32s2_twai]
platform = ${espidf6.platform}
platform_packages = ${espidf6.platform_packages}
board = esp32-s2-saola-1
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -DREC_CAP=512
    -std=gnu++17
build_unflags = -std=gnu++11

board_build.partitions = partitions_4mb_ota_1536k.csv
monitor_speed = 115200

[env:esp32_feather_v2_mcp2515]
platform = ${espidf6.platform}
platform_packages = ${espidf6.platform_packages}
board = adafruit_feather_esp32_v2
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
monitor_speed = 115200
build_flags =
    -DDRIVER_ESP32_EXT_MCP2515
    -DESP32_DASHBOARD
    -DPIN_CAN_CS=14
    -DPIN_CAN_INTERRUPT=32
    -DPIN_LED=13
    -DSPI_SCK=5
    -DSPI_MISO=21
    -DSPI_MOSI=19
    -DMCP_CRYSTAL_FREQ=MCP_16MHZ
    -std=gnu++17
board_build.partitions = partitions_8mb_ota_3072k.csv
build_unflags = -std=gnu++11

[env:lilygo_tcan485_hw3]
platform = ${espidf6.platform}
platform_packages = ${espidf6.platform_packages}
board = esp32dev
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -DTWAI_TX_PIN=GPIO_NUM_27
    -DTWAI_RX_PIN=GPIO_NUM_26
    -DPIN_LED=2
    -std=gnu++17
build_unflags = -std=gnu++11
board_build.partitions = partitions_4mb_ota_1536k.csv
monitor_speed = 115200

[env:m5stack-atomic-can-base]
platform = ${espidf6.platform}
platform_packages = ${espidf6.platform_packages}
board = m5stack-atom
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -DPIN_LED=27
    -DDASH_RGB_STATUS_LED
    -DTWAI_TX_PIN=GPIO_NUM_22
    -DTWAI_RX_PIN=GPIO_NUM_19
    -DDASH_ALLOW_CAN_GPIO_6_11=1
    -std=gnu++17
build_unflags = -std=gnu++11
board_build.partitions = partitions_4mb_ota_1536k.csv
monitor_speed = 115200

[env:m5stack-atoms3-mini-can-base]
platform = ${espidf6.platform}
platform_packages = ${espidf6.platform_packages}
board = m5stack-atoms3
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -DPIN_LED=35
    -DDASH_RGB_STATUS_LED
    -DDASH_INJECTION_TOGGLE_PIN=41
    -DTWAI_TX_PIN=GPIO_NUM_2
    -DTWAI_RX_PIN=GPIO_NUM_1
    -DDASH_ALLOW_CAN_GPIO_6_11=1
    -std=gnu++17
build_unflags = -std=gnu++11
board_build.partitions = partitions_4mb_ota_1536k.csv
monitor_speed = 115200

[env:esp32_ext_mcp2515]
platform = ${espidf6.platform}
platform_packages = ${espidf6.platform_packages}
board = esp32-s3-devkitc-1
framework = espidf
lib_deps = bblanchon/ArduinoJson@^7
extra_scripts = pre:scripts/platformio_sync_profile.py
build_flags =
    -DDRIVER_ESP32_EXT_MCP2515
    -DESP32_DASHBOARD
    -DPIN_LED=2
    -DPIN_CAN_CS=10
    -DPIN_CAN_INTERRUPT=9
    -DSPI_SCK=12
    -DSPI_MISO=13
    -DSPI_MOSI=11
    -DMCP_CRYSTAL_FREQ=MCP_8MHZ
    -std=gnu++17
board_build.partitions = partitions_8mb_ota_3072k.csv
build_unflags = -std=gnu++11
monitor_speed = 115200

[env:waveshare_ESP32_S3_RS485_CAN]
platform = ${espidf6.platform}
platform_packages = ${espidf6.platform_packages}
board = esp32s3box
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD

    -DTWAI_TX_PIN=GPIO_NUM_15
    -DTWAI_RX_PIN=GPIO_NUM_16
    -DPIN_LED=14
    -std=gnu++17
build_unflags = -std=gnu++11
board_build.partitions = partitions_4mb_ota_1536k.csv
monitor_speed = 115200

[env:native]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
test_ignore =
    test_native_dashboard
    test_native_nag
build_flags = -std=c++17 -DNATIVE_BUILD
test_filter = test_native_*

[env:native_dashboard]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DESP32_DASHBOARD
test_filter = test_native_dashboard

[env:native_log_buffer]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD
test_filter = test_native_log_buffer

[env:native_nag]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD
test_filter = test_native_nag

